<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Costos Yuca</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">

    <!-- HEADER -->
    <div class="top-banner">

        <div class="logo-box">
            <img src="logo.png" alt="Logo" class="logo">
        </div>

        <div class="title-box">
            <h1>
                <center>
                <span class="verde">Costos de</span><br>
                <span class="marron">Yuca</span>
                </center>
            </h1>
        </div>

    </div>

    <!-- CONTENIDO -->
    <div class="content">

        <!-- FORMULARIO -->
        <div class="card form-card">

            <div class="card-title green">
                INGRESÁ LOS DATOS
            </div>

            <label>Precio Dólar (CRC)</label>

<div class="dolar-container">

    <input type="number" id="dolar" value="450">

    <button type="button"
            class="btn-dolar"
            onclick="obtenerTipoCambio()">

        TC Actual

    </button>

</div>

            <label>Yuca Campo (CRC)</label>
            <input type="number" id="yuca" value="13000">

            <label>Maquila (CRC)</label>
            <input type="number" id="maquila" value="4500">

            <label>KG</label>
            <input type="number" id="kg" value="23">

            <label>Cartón (USD)</label>
            <input type="number" id="carton" value="1.8">

            <button onclick="calcular()">
                CALCULAR
            </button>

        </div>

        <!-- RESULTADOS -->
        <div class="card result-card">

            <div class="card-title yellow">
                RESULTADOS
            </div>

            <div class="resultado-item">
                <span>Costo KG Yuca</span>
                <strong id="kgYuca">0</strong>
            </div>

            <div class="resultado-item">
                <span>Costo KG Maquila</span>
                <strong id="kgMaquila">0</strong>
            </div>

            <div class="resultado-item">
                <span>Precio (CRC)</span>
                <strong id="precio">0</strong>
            </div>

            <div class="resultado-item">
                <span>Dólar (USD)</span>
                <strong id="resultadoDolar">0</strong>
            </div>

            <div class="total-box">
                <div class="total-label">
                    TOTAL (USD)
                </div>

                <div class="total-valor" id="total">
                    0
                </div>
            </div>

            <div class="info-box">
                El total incluye el valor en dólares + el costo del cartón.
            </div>

        </div>

    </div>

    <div class="footer">
        Desarrollado por <a href="https://wa.me/50684225223" target="_blank">D-Xing</a>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
