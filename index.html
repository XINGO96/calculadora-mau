<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Calculadora de Costos</h1>

  <label>Precio Dólar</label>
  <input type="number" id="dolar" value="450">

  <label>Yuca Campo</label>
  <input type="number" id="yuca" value="13000">

  <label>Maquila</label>
  <input type="number" id="maquila" value="4500">

  <label>KG</label>
  <input type="number" id="kg" value="23">

  <label>Cartón</label>
  <input type="number" id="carton" value="1.8">

  <button onclick="calcular()">Calcular</button>

  <div class="resultados">
    <p>Costo KG Yuca: <span id="kgYuca">0</span></p>
    <p>Costo KG Maquila: <span id="kgMaquila">0</span></p>
    <p>Precio: <span id="precio">0</span></p>
    <p>Dólar: <span id="resultadoDolar">0</span></p>
    <p>Total: <span id="total">0</span></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
